<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業務管理系統 & Google 雲端整合</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/presales.css">
  <link rel="stylesheet" href="css/postsales.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/google-sync.css">
  <link rel="stylesheet" href="css/cards.css">
  
  <!-- Google API Client Libraries (Deferred loading) -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="dark-theme">
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="6" width="20" height="14" rx="4" fill="url(#brand-grad)" />
            <path d="M12 2L16 6H8L12 2Z" fill="var(--color-primary)" />
            <defs>
              <linearGradient id="brand-grad" x1="2" y1="6" x2="22" y2="20" gradientUnits="userSpaceOnUse">
                <stop stop-color="var(--color-primary)" />
                <stop offset="1" stop-color="var(--color-secondary)" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2>BizFlow Hub</h2>
      </div>

      <nav class="sidebar-menu">
        <ul>
          <li class="menu-item active" data-view="dashboard">
            <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>儀表總覽</span>
          </li>
          <li class="menu-item" data-view="presales">
            <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><polygon points="12 11 12 17 17 14"></polygon></svg>
            <span>售前專案進度</span>
          </li>
          <li class="menu-item" data-view="postsales">
            <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            <span>售後收款追蹤</span>
            <span class="badge badge-success count-bubble" id="postsales-active-count" style="display:none;">0</span>
          </li>
          <li class="menu-item" data-view="calendar">
            <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span>全局日曆足跡</span>
          </li>
          <li class="menu-item" data-view="cards">
            <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            <span>客戶資料管理</span>
          </li>
          <li class="menu-item" data-view="google-sync">
            <svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span>Google 雲端整合</span>
          </li>
        </ul>
      </nav>

      <!-- Google Integration Status Card -->
      <div class="sidebar-status-card">
        <div class="status-header">
          <span class="status-dot offline" id="google-status-dot"></span>
          <span id="google-status-text">未連線至 Google</span>
        </div>
        <div class="status-details" id="google-status-details">
          本地模擬模式 (Demo Mode) 已啟用
        </div>
        <button class="btn btn-sm btn-outline-primary" id="sidebar-sync-btn" style="margin-top: 10px; width: 100%;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
          立即同步
        </button>
      </div>
    </aside>

    <!-- Main Workspace -->
    <div class="workspace">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <h1 id="view-title">儀表總覽</h1>
        </div>
        <div class="header-right">
          <div class="theme-toggle" id="theme-toggle-btn" title="切換主題">
            <!-- Sun / Moon SVG -->
            <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </div>
          <div class="date-time-indicator" id="header-date-time">
            2026-05-24 18:23
          </div>
          <div class="user-profile" id="user-profile-widget">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='32' height='32'%3E%3Crect width='100%25' height='100%25' fill='%236366f1'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23ffffff' font-family='sans-serif' font-size='12' font-weight='bold'%3EBIZ%3C/text%3E%3C/svg%3E" alt="User Avatar" class="user-avatar" id="user-avatar-img">
            <div class="user-info">
              <span class="user-name" id="user-name-text">訪客使用者</span>
              <span class="user-role">系統管理員</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Dynamic View Container -->
      <main class="view-content" id="app-view">
        <!-- Rendered dynamically by JS modules -->
      </main>
    </div>
  </div>

  <!-- Toast Notifications Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Floating Modal (Shared Container) -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <button class="modal-close-btn" id="modal-close-btn">&times;</button>
      <div class="modal-body" id="modal-body">
        <!-- Content injected dynamically -->
      </div>
    </div>
  </div>

  <!-- Javascript Modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
